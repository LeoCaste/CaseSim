<section class="login-page">
  <article class="login-card">
    <header class="login-card__header">
      <div class="login-logo">CS</div>
      <div>
        <p>CaseSim</p>
        <h1>Recuperar contraseña</h1>
        <span>Ingresa tu correo institucional</span>
      </div>
    </header>

    <form class="login-form" (ngSubmit)="submit()">
      <label>
        Correo institucional
        <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
      </label>

      <p class="login-error" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="login-help" *ngIf="infoMessage">{{ infoMessage }}</p>

      <button class="login-button" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Enviando...' : 'Enviar enlace de recuperación' }}
      </button>

      <p class="login-help"><a routerLink="/login">Volver a ingreso</a></p>
    </form>
  </article>
</section>
