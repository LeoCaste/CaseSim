<section class="login-page">
  <article class="login-card">
    <header class="login-card__header">
      <div class="login-logo">CS</div>

      <div>
        <p>CaseSim</p>
        <h1>Ingreso institucional</h1>
        <span>Simulación clínica asistida por IA</span>
      </div>
    </header>

    <form class="login-form" #loginForm="ngForm" (ngSubmit)="login()">
      <label>
        Correo institucional
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          placeholder="correo institucional"
          autocomplete="email"
        />
      </label>

      <p class="login-help">
        Ingresa tu correo institucional
      </p>

      <p class="login-error" *ngIf="error">
        {{ error }}
      </p>

      <button class="login-button" type="submit" [disabled]="isLoading || loginForm.invalid">
        Ingresar
      </button>
    </form>
  </article>
</section>
