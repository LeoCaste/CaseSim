<section class="evaluation-card">
  <header>
    <p>Diagnóstico final</p>
    <h2>Respuesta del estudiante</h2>
  </header>

  <div class="evaluation-block">
    <span>Diagnóstico presuntivo</span>
    <p>{{ diagnosis.finalDiagnosis }}</p>
  </div>

  <div class="evaluation-block">
    <span>Razonamiento clínico</span>
    <p>{{ diagnosis.reasoning }}</p>
  </div>

  <footer class="evaluation-actions">
    <button class="cs-button secondary" type="button">
      Agregar feedback
    </button>

    <button class="cs-button primary" type="button">
      Finalizar revisión
    </button>
  </footer>
</section>
