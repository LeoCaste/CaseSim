<section class="transcript-card">
  <header class="transcript-header">
    <div>
      <p>Transcripción</p>
      <h2>Entrevista clínica</h2>
    </div>
  </header>

  <div class="transcript-list" #transcriptList>
    <article
      *ngFor="let message of messages"
      class="transcript-message"
      [class.patient]="isPatientMessage(message.role)"
      [class.student]="isStudentMessage(message.role)"
    >
      <div class="message-meta">
        <span>{{ message.role }}</span>
        <time>{{ message.time }}</time>
      </div>

      <p>{{ message.content }}</p>
    </article>
  </div>
</section>
