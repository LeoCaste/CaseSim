services:
  postgres:
    image: postgres:16
    container_name: casesim_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: casesim_db
      POSTGRES_USER: casesim_user
      POSTGRES_PASSWORD: casesim_pass
    ports:
      - "5433:5432"
    volumes:
      - casesim_postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  casesim_postgres_data:
