# CaseSim - Docker Compose para servidor universitario
# Uso:
#   docker compose up -d                    # levantar stack completo
#   docker compose down                      # detener stack
#   docker compose logs -f backend           # monitorear backend
#
# Para desarrollo local (backend fuera de Docker),
# se requiere PostgreSQL expuesto:
#   docker compose up -d postgres
# y descomentar ports en servicio postgres.

services:
  postgres:
    image: postgres:16-alpine
    container_name: casesim_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB es obligatorio}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER es obligatorio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD es obligatorio}
    # Puerto NO expuesto públicamente por seguridad.
    # Para desarrollo local, descomentar:
    # ports:
    #   - "127.0.0.1:5433:5432"
    volumes:
      - casesim_postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/dev-seed.sql:/docker-entrypoint-initdb.d/02-dev-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER es obligatorio} -d ${POSTGRES_DB:?POSTGRES_DB es obligatorio}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: casesim_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/casesim_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME es obligatorio}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD es obligatorio}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      APP_ENV: ${APP_ENV:-prod}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es obligatorio}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      CASESIM_LLM_CIPHER_KEY: ${CASESIM_LLM_CIPHER_KEY:?CASESIM_LLM_CIPHER_KEY es obligatorio}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:?APP_CORS_ALLOWED_ORIGINS es obligatorio}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:?APP_FRONTEND_BASE_URL es obligatorio}
      CASESIM_PASSWORD_RESET_MODE: ${CASESIM_PASSWORD_RESET_MODE:-MANUAL}
      CASESIM_OPERATIONS_TOKEN: ${CASESIM_OPERATIONS_TOKEN:?CASESIM_OPERATIONS_TOKEN es obligatorio}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1/chat/completions}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-350}
      LLM_HISTORY_TURNS: ${LLM_HISTORY_TURNS:-6}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: casesim_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  casesim_postgres_data:
