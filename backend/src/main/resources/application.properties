spring.application.name=casesim-backend

app.env=${APP_ENV:dev}
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/casesim_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:casesim_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:casesim_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

llm.enabled=${LLM_ENABLED:false}
llm.provider=${LLM_PROVIDER:openai}
llm.api-key=${LLM_API_KEY:}
llm.model=${LLM_MODEL:gpt-4o-mini}
llm.base-url=${LLM_BASE_URL:https://api.openai.com/v1/chat/completions}
llm.timeout-ms=${LLM_TIMEOUT_MS:30000}
llm.max-retries=${LLM_MAX_RETRIES:1}
llm.temperature=${LLM_TEMPERATURE:0.4}
llm.max-tokens=${LLM_MAX_TOKENS:350}
llm.history-turns=${LLM_HISTORY_TURNS:6}

security.jwt.secret=${JWT_SECRET:dev-secret-change-me}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

casesim.security.llm-key=${CASESIM_LLM_CIPHER_KEY:casesim-default-llm-key}
casesim.auth.bootstrap-token=${BOOTSTRAP_TOKEN:}
