spring.application.name=casesim-backend

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/casesim_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:casesim_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:casesim_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
